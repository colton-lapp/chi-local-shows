name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'scoring.py'
      - 'export.py'
      - 'cache.py'
      - 'static/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Import data cache
        run: |
          if [ -f shows_cache.json ]; then
            uv run python cache.py import
          else
            echo "No cache found — run the fetch workflow first" && exit 1
          fi

      - name: Regenerate HTML
        run: uv run python export.py

      - name: Prepare publish directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r static dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
