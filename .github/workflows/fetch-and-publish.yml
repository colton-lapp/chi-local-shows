name: Fetch shows and publish

on:
  schedule:
    - cron: '0 10 * * 0,3'   # twice weekly — Sunday & Wednesday 10 am UTC (keeps each
                              # run's band backlog under the Google Search API's 100/day cap)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Fetch shows (7-day window)
        run: uv run python fetch.py --days 7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}

      - name: Export data cache
        run: uv run python cache.py export

      - name: Export static HTML
        run: uv run python export.py

      - name: Commit data cache and generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_cache.json index.html
          git diff --staged --quiet || git commit -m "chore: update shows cache and index.html [skip ci]"
          git push

      - name: Assemble publish directory
        run: |
          mkdir -p dist
          cp index.html about.html ai-usage.html dist/
          cp -r static dist/

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
