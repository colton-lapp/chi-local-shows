name: Fetch shows and publish

on:
  schedule:
    - cron: '0 10 * * 0'   # weekly — Sunday 10 am UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Fetch shows (14-day window)
        run: uv run python fetch.py --days 14
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}

      - name: Export static HTML
        run: uv run python export.py

      - name: Assemble publish directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r static dist/

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
